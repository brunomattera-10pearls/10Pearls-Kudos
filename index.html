<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KUDOS Generator – 10Pearls</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #D4FF27; --green-dim: rgba(212,255,39,0.1); --green-border: rgba(212,255,39,0.25);
    --bg: #111110; --surface: #1A1A18; --surface2: #212120; --border: rgba(255,255,255,0.07);
    --text: #F0EFEB; --muted: rgba(240,239,235,0.85); --radius: 14px; --font: 'Nunito Sans', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.025;
  }
  .glow { position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 700px; height: 500px; pointer-events: none; z-index: 0; background: radial-gradient(ellipse at center, rgba(212,255,39,0.09) 0%, transparent 70%); }
  .inner { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 40px 24px 60px; }

  /* LANG SWITCHER */
  .ui-lang-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; }
  .ui-lang-wrap { display: flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .ui-lang-btn { font-family: var(--font); font-size: 13px; font-weight: 700; padding: 7px 18px; background: transparent; color: var(--muted); border: none; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .ui-lang-btn:hover { color: var(--text); }
  .ui-lang-btn.on { background: var(--green); color: #111110; }

  /* HEADER */
  .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
  .badge { font-family: var(--font); font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); padding: 3px 10px; border-radius: 100px; }

  /* HERO: título + ilustración lado a lado */
  .hero { display: flex; align-items: center; justify-content: space-between; gap: 24px; margin-bottom: 12px; }
  .hero-text { flex: 1; }
  h1 { font-size: clamp(28px,4.5vw,48px); font-weight: 900; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 8px; white-space: nowrap; }
  h1 span { color: var(--green); }
  .subline { font-size: 14px; color: var(--muted); line-height: 1.4; white-space: nowrap; margin-bottom: 0; }
  .hero-illo { flex-shrink: 0; width: 130px; height: 130px; margin-top: -20px; }
  @media (max-width: 560px) { .hero { flex-direction: column; align-items: flex-start; } h1 { white-space: normal; } .subline { white-space: normal; } .hero-illo { width: 100px; height: 100px; margin-top: 0; } }

  /* GRID */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  .col { display: flex; flex-direction: column; gap: 16px; align-self: stretch; }
  .col .card { flex: 1; }
  .full { grid-column: 1 / -1; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .section-title { font-family: var(--font); font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); margin-bottom: 14px; }
  .section-title-lg { font-family: var(--font); font-size: 13px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title-lg::before { content: ''; display: block; width: 3px; height: 14px; background: var(--green); border-radius: 2px; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field + .field { margin-top: 14px; }
  label { font-family: var(--font); font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text); }
  input, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font); font-size: 14px; padding: 11px 13px; outline: none; width: 100%; transition: border-color 0.2s, box-shadow 0.2s; }
  input:focus, textarea:focus { border-color: var(--green-border); box-shadow: 0 0 0 3px rgba(212,255,39,0.06); }
  input::placeholder, textarea::placeholder { color: rgba(240,239,235,0.3); }
  textarea { resize: vertical; min-height: 82px; }

  /* PILLS — fuente explícita para igualar con tone buttons */
  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { font-family: var(--font); font-size: 13px; font-weight: 600; padding: 6px 13px; border-radius: 100px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s; user-select: none; }
  .pill:hover { border-color: var(--green-border); color: var(--text); }
  .pill.on { background: var(--green-dim); border-color: var(--green); color: var(--green); }



  /* GENERATE BUTTON */
  .btn-gen { width: 100%; padding: 16px; background: var(--green); color: #111110; font-family: var(--font); font-size: 15px; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase; border: none; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: filter 0.2s, transform 0.15s; }
  .btn-gen:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); }
  .btn-gen:active:not(:disabled) { transform: translateY(0); }
  .btn-gen:disabled { opacity: 0.5; cursor: not-allowed; }
  .dots { display: flex; gap: 4px; align-items: center; }
  .dot { width: 6px; height: 6px; background: #111110; border-radius: 50%; animation: bounce 0.8s infinite; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(1);opacity:.7} 40%{transform:scale(1.4);opacity:1} }

  /* RESULT */
  .result-card { background: var(--surface); border: 1px solid var(--green-border); border-radius: var(--radius); padding: 26px; display: none; animation: fadeUp 0.35s ease; }
  .result-card.visible { display: block; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .result-label { font-family: var(--font); font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); }
  .btn-copy { font-family: var(--font); font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 100px; border: 1px solid var(--green-border); background: var(--green-dim); color: var(--green); cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .btn-copy:hover { background: rgba(212,255,39,0.2); }
  .btn-copy.copied { background: var(--green); color: #111110; border-color: var(--green); }
  .kudos-text { font-size: 16px; line-height: 1.78; color: var(--text); white-space: pre-wrap; }
  .result-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-action { font-family: var(--font); font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 100px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s; }
  .btn-action:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }
  .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-action.spinning span.ico { display: inline-block; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { font-size: 13px; text-align: center; margin-top: 10px; min-height: 20px; }
  .msg.error { color: rgba(255,100,100,0.85); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(2px)} }
  .shake { animation: shake 0.35s ease; }


  /* MODE TABS */
  .mode-tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; width: fit-content; }
  .mode-tab { font-family: var(--font); font-size: 13px; font-weight: 700; padding: 10px 28px; background: transparent; color: var(--muted); border: none; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
  .mode-tab:hover { color: var(--text); }
  .mode-tab.on { background: var(--green); color: #111110; }
  .mode-panel { display: none; }
  .mode-panel.visible { display: block; }

  /* TWO STEP FLOW */
  .step { transition: opacity 0.3s ease; }
  .step.hidden { display: none; }
  .step2-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .btn-back { font-family: var(--font); font-size: 13px; font-weight: 700; padding: 9px 18px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: all 0.15s; line-height: 1; }
  .btn-back:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .step2-title { font-family: var(--font); font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

  /* IMAGE CARD SECTION */
  .card-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
  .card-section-title { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0; }

  .style-tab { font-family: var(--font); font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .style-tab:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }
  .style-tab.on { background: var(--green); border-color: var(--green); color: #111110; font-weight: 700; }
  .card-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .style-tabs { display: flex; gap: 8px; }
  .canvas-wrap { border-radius: 10px; overflow: hidden; background: var(--surface2); display: inline-block; width: 100%; }
  .card-bottom-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; flex-wrap: wrap; gap: 10px; }
  .canvas-wrap canvas { display: block; width: 100%; height: auto; }
  .btn-download { margin-top: 12px; font-family: var(--font); font-size: 13px; font-weight: 700; padding: 10px 20px; border-radius: 100px; border: 1px solid var(--green-border); background: var(--green-dim); color: var(--green); cursor: pointer; display: inline-flex; align-items: center; gap: 7px; transition: all 0.15s; }
  .btn-download:hover { background: rgba(212,255,39,0.2); }

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js">


  // ── MODE SWITCHING ──
  let currentMode = "ai";

  function switchMode(mode) {
    currentMode = mode;
    document.getElementById("panelAI").classList.toggle("visible", mode === "ai");
    document.getElementById("panelManual").classList.toggle("visible", mode === "manual");
    document.getElementById("modeAI").classList.toggle("on", mode === "ai");
    document.getElementById("modeManual").classList.toggle("on", mode === "manual");
  }

  // ── MANUAL GENERATE ──
  function generateManual() {
    const name   = document.getElementById("nameManual").value.trim();
    const sender = document.getElementById("senderManual").value.trim();
    const text   = document.getElementById("manualText").value.trim();
    const msgBox = document.getElementById("msgBoxManual");

    msgBox.textContent = ""; msgBox.className = "msg";

    if (!text) {
      document.getElementById("generateBtnManual").classList.add("shake");
      setTimeout(() => document.getElementById("generateBtnManual").classList.remove("shake"), 400);
      msgBox.textContent = T[uiLang].errFields; msgBox.className = "msg error"; return;
    }

    document.getElementById("kudosText").textContent = text;
    showCard(text, name, sender);
  }

</script>

  // ── SHORTER / REMIX ──

  function drawCard(text, recipientName, style, sender) {
    const canvas = document.getElementById("kudosCanvas");
    const W = 900;

    // Measure text lines with offscreen canvas to avoid context reset
    const offscreen = document.createElement("canvas");
    offscreen.width = W; offscreen.height = 100;
    const octx = offscreen.getContext("2d");
    octx.font = "500 22px 'Georgia', serif";
    const words = text.split(" ");
    const maxW = W - 96;
    let line = "", lineCount = 0;
    for (let w of words) {
      const test = line + w + " ";
      if (octx.measureText(test).width > maxW && line !== "") { lineCount++; line = w + " "; }
      else line = test;
    }
    if (line.trim()) lineCount++;
    const textH = lineCount * 36;
    const nameBlockH = (recipientName || sender) ? 85 : 20; // name block to text start
    const headerH = 52;   // KUDOS label
    const brandingH = 50; // bottom branding
    const H = Math.max(220, headerH + nameBlockH + 28 + textH + brandingH);
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");

    if (style === "classic") drawClassic(ctx, W, H, text, recipientName, sender);
    else drawFun(ctx, W, H, text, recipientName, sender);
  }

  function wrapText(ctx, text, x, y, maxW, lineH) {
    const words = text.split(" ");
    let line = "";
    let lines = [];
    for (let w of words) {
      const test = line + w + " ";
      if (ctx.measureText(test).width > maxW && line !== "") {
        lines.push(line.trim()); line = w + " ";
      } else { line = test; }
    }
    if (line.trim()) lines.push(line.trim());
    lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineH));
    return lines.length;
  }

  function drawClassic(ctx, W, H, text, name, sender) {
    // Background
    ctx.fillStyle = "#111110";
    ctx.fillRect(0, 0, W, H);

    // Green accent bar left
    ctx.fillStyle = "#D4FF27";
    ctx.fillRect(0, 0, 6, H);

    // Subtle grid pattern
    ctx.strokeStyle = "rgba(212,255,39,0.04)";
    ctx.lineWidth = 1;
    for (let x = 40; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 40; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // Top label
    ctx.fillStyle = "#D4FF27";
    ctx.font = "bold 13px 'Arial', sans-serif";
    ctx.letterSpacing = "3px";
    ctx.fillText("✦  K U D O S", 48, 52);
    ctx.letterSpacing = "0px";

    // Divider line
    ctx.strokeStyle = "rgba(212,255,39,0.2)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(48, 64); ctx.lineTo(W - 48, 64); ctx.stroke();

    // For: [name]  ·  From: [sender] — inline, left-aligned together
    let nameRowH = 0;
    if (name || sender) {
      // Label row
      ctx.font = "500 12px 'Arial', sans-serif";
      ctx.fillStyle = "rgba(240,239,235,0.7)";
      let labelX = 48;
      if (sender) {
        ctx.fillText("From:", labelX, 90);
        const fromLabelW = ctx.measureText("From:").width;
        ctx.font = "bold 17px 'Arial', sans-serif";
        ctx.fillStyle = "rgba(240,239,235,0.85)";
        ctx.fillText(sender, labelX, 109);
        const senderW = ctx.measureText(sender).width;
        labelX += Math.max(fromLabelW, senderW) + 28;
      }
      if (name) {
        ctx.font = "500 12px 'Arial', sans-serif";
        ctx.fillStyle = "rgba(240,239,235,0.7)";
        ctx.fillText("To:", labelX, 90);
        ctx.font = "bold 17px 'Arial', sans-serif";
        ctx.fillStyle = "#D4FF27";
        ctx.fillText(name, labelX, 109);
      }
      nameRowH = 52;
    }

    // Main kudos text — 20px padding below name block
    ctx.fillStyle = "#F0EFEB";
    ctx.font = "500 22px 'Georgia', serif";
    const textStartClassic = (name || sender) ? 109 + 38 : 84;
    const lines = wrapTextReturn(ctx, text, 48, textStartClassic, W - 96, 36);
    const totalTextH = lines * 36;

    // Branding only at bottom
    ctx.fillStyle = "rgba(240,239,235,0.5)";
    ctx.font = "600 12px 'Arial', sans-serif";
    ctx.letterSpacing = "1px";
    ctx.fillText("10PEARLS  ·  PEOPLE & CULTURE", 48, H - 22);
    ctx.letterSpacing = "0px";

    // Medal icon top right — above divider
    ctx.fillStyle = "rgba(212,255,39,0.15)";
    ctx.font = "72px serif";
    ctx.fillText("🏅", W - 110, 58);
  }

  function drawFun(ctx, W, H, text, name, sender) {
    // Background
    ctx.fillStyle = "#0F0F0E";
    ctx.fillRect(0, 0, W, H);

    // Top color strip
    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0,   "#D4FF27");
    grad.addColorStop(0.4, "#FFB432");
    grad.addColorStop(0.7, "#FF6496");
    grad.addColorStop(1,   "#64C8FF");
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, 7);

    // Bottom color strip (mirror)
    ctx.fillStyle = grad;
    ctx.fillRect(0, H - 7, W, 7);

    // Confetti dots — scattered along top strip area
    const dots = [
      {x:60,  y:28, r:4, c:"#D4FF27"},
      {x:160, y:22, r:3, c:"#FF6496"},
      {x:280, y:30, r:4, c:"#FFB432"},
      {x:420, y:20, r:3, c:"#64C8FF"},
      {x:560, y:28, r:4, c:"#D4FF27"},
      {x:680, y:22, r:3, c:"#FF6496"},
      {x:800, y:26, r:4, c:"#FFB432"},
      {x:860, y:20, r:3, c:"#64C8FF"},
    ];
    dots.forEach(d => {
      ctx.fillStyle = d.c;
      ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
    });

    // KUDOS badge pill — top left, text centered
    ctx.font = "bold 13px 'Arial', sans-serif";
    ctx.letterSpacing = "2px";
    const badgeText = "✦ KUDOS";
    const badgeW = ctx.measureText(badgeText).width + 32;
    roundRect(ctx, 44, 30, badgeW, 32, 16);
    ctx.fillStyle = "#D4FF27";
    ctx.fill();
    ctx.fillStyle = "#0F0F0E";
    ctx.textAlign = "center";
    ctx.fillText(badgeText, 44 + badgeW / 2, 51);
    ctx.textAlign = "left";
    ctx.letterSpacing = "0px";

    // Party emoji top right — balanced with badge
    ctx.font = "32px serif";
    ctx.fillText("🎉", W - 76, 58);

    // Divider
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(44, 76); ctx.lineTo(W - 44, 76); ctx.stroke();

    // For: [name]  ·  From: [sender] — inline together
    let funNameRowH = 0;
    if (name || sender) {
      let lx = 44;
      ctx.font = "500 12px 'Arial', sans-serif";
      ctx.fillStyle = "rgba(240,239,235,0.7)";
      if (sender) {
        ctx.fillText("From:", lx, 95);
        const fl = ctx.measureText("From:").width;
        ctx.font = "bold 17px 'Arial', sans-serif";
        ctx.fillStyle = "rgba(240,239,235,0.85)";
        ctx.fillText(sender, lx, 114);
        const sl = ctx.measureText(sender).width;
        lx += Math.max(fl, sl) + 28;
      }
      if (name) {
        ctx.font = "500 12px 'Arial', sans-serif";
        ctx.fillStyle = "rgba(240,239,235,0.7)";
        ctx.fillText("To:", lx, 95);
        ctx.font = "bold 17px 'Arial', sans-serif";
        ctx.fillStyle = "#D4FF27";
        ctx.fillText(name, lx, 114);
      }
      funNameRowH = 50;
    }

    // Main text
    ctx.fillStyle = "#F0EFEB";
    ctx.font = "500 21px 'Georgia', serif";
    const textStartY = (name || sender) ? 114 + 38 : 84;
    wrapTextReturn(ctx, text, 44, textStartY, W - 88, 34);

    // Branding only at bottom
    ctx.fillStyle = "rgba(240,239,235,0.5)";
    ctx.font = "600 11px 'Arial', sans-serif";
    ctx.letterSpacing = "1.5px";
    ctx.fillText("10PEARLS  ·  PEOPLE & CULTURE", 44, H - 22);
    ctx.letterSpacing = "0px";
  }

  function wrapTextReturn(ctx, text, x, y, maxW, lineH) {
    const words = text.split(" ");
    let line = ""; let count = 0;
    for (let w of words) {
      const test = line + w + " ";
      if (ctx.measureText(test).width > maxW && line !== "") {
        ctx.fillText(line.trim(), x, y + count * lineH);
        line = w + " "; count++;
      } else { line = test; }
    }
    if (line.trim()) { ctx.fillText(line.trim(), x, y + count * lineH); count++; }
    return count;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  function generateManual() {

    msgBox.textContent = ""; msgBox.className = "msg";

    if (!text) {
      document.getElementById("generateBtnManual").classList.add("shake");
      setTimeout(() => document.getElementById("generateBtnManual").classList.remove("shake"), 400);
      msgBox.textContent = T[uiLang].errFields; msgBox.className = "msg error"; return;
    }

    document.getElementById("kudosText").textContent = text;
    showCard(text, name, sender);
  }
